<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>Github-Issue-Tracker|Sign in</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- daisyui and tailwind css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="flex items-center justify-between mb-7 shadow rounded-2xl p-4 bg-white">
        <div class="flex items-center gap-2 font-bold text-xl">
            <img src="./assets/github-logo.png" class="w-6 h-6" alt="logo" />
            <span>GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-4">
            <div class="relative">
                <input id="search-input" type="text" placeholder="Search issues..." 
                    class="pl-10 pr-4 py-2 border rounded-lg w-64 focus:ring-2 focus:ring-indigo-500 outline-none" />
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
            </div>
            <button class="bg-indigo-600 text-white cursor-pointer px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                + New Issue
            </button>
        </div>
    </header>

    <div id="filter-container" class="bg-white p-4 rounded-xl shadow mb-6 flex gap-2 max-w-11/12 mx-auto">
        <button onclick="fetchIssues('all')" class="filter-btn px-8 py-2 bg-indigo-600 text-white rounded-lg font-medium cursor-pointer ">All</button>
        <button onclick="fetchIssues('open')" class="filter-btn px-8 py-2 bg-transparent hover:bg-gray-100 text-gray-600 rounded-lg font-medium border cursor-pointer ">Open</button>
        <button onclick="fetchIssues('closed')" class="filter-btn px-8 py-2 bg-transparent hover:bg-gray-100 text-gray-600 rounded-lg font-medium border cursor-pointer ">Closed</button>
    </div>

    <div class="max-w-11/12 mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-3 items-center">
                <img src="./assets/Aperture.png" alt="icon" class="w-10 h-10" />
                <div>
                    <h2 id="issue-count" class="text-xl font-semibold">0 Issues</h2>
                    <h3 class="text-gray-500">Track and manage your project issues</h3>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <div class="flex items-center gap-1 text-green-600">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span> Open
                </div>
                <div class="flex items-center gap-1 text-purple-600">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed
                </div>
            </div>
        </div>

        <div id="loading" class="hidden flex justify-center my-10">
            <span class="loading loading-spinner loading-lg text-indigo-600"></span>
        </div>

        <div id="issue-container" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
           

        </div>
    </div>

    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box" id="modal-content">
            </div>
    </dialog>

    <script src="./js-file/home.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>Github-Issue-Tracker|Sign in</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- daisyui and tailwind css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- header  -->
   <header class="flex items-center justify-between mb-7 shadow rounded-2xl p-2  ">
    <div class="flex items-center gap-2 font-bold text-xl">
      <img src="./assets/github-logo.png" class="w-6 h-6" alt="logo">
      <span>GitHub Issues Tracker</span>
    </div>
    <div class="flex gap-4">
      <div class="relative">
        <input type="text" placeholder="Search issues..." class="pl-10 pr-4 py-2 border rounded-lg w-64 focus:ring-2 focus:ring-indigo-500 outline-none">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
      </div>
      <button class="bg-indigo-600 text-white cursor-pointer px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">+ New Issue</button>
    </div>
  </header>
  <!-- batton -->
   <div class="bg-white p-4 rounded-xl shadow mb-6 flex gap-2 w-11/12 mx-auto">
    <button class="px-8 py-2 bg-indigo-600 text-white rounded-lg font-medium">All</button>
    <button class="px-8 py-2 bg-transparent hover:bg-gray-100 text-gray-600 rounded-lg font-medium border">Open</button>
    <button class="px-8 py-2 bg-transparent hover:bg-gray-100 text-gray-600 rounded-lg font-medium border">Closed</button>
  </div>



   <script src="./js-file/home.js"></script>
  </body>
</html>
